<svg width="240" height="280" viewBox="0 0 240 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Premium Task Chair - Fully adjustable with headrest and tilt lock -->
  <!-- Headrest -->
  <rect x="78" y="8" width="84" height="30" rx="10" fill="#1a1a2e"/>
  <rect x="84" y="12" width="72" height="22" rx="7" fill="#2d2d44"/>
  <!-- Headrest stem -->
  <rect x="114" y="38" width="12" height="14" rx="4" fill="#3d3d5c"/>
  <!-- Backrest -->
  <path d="M65 52 Q120 44 175 52 L180 155 Q120 162 60 155 Z" fill="#1a1a2e"/>
  <path d="M72 58 Q120 50 168 58 L172 149 Q120 156 68 149 Z" fill="#2d2d44"/>
  <!-- Back cushion padding -->
  <rect x="80" y="65" width="80" height="78" rx="6" fill="#3d3d5c"/>
  <!-- Stitching details -->
  <line x1="120" y1="70" x2="120" y2="138" stroke="#4a4a66" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="100" y1="70" x2="100" y2="138" stroke="#4a4a66" stroke-width="0.5" stroke-dasharray="3 4"/>
  <line x1="140" y1="70" x2="140" y2="138" stroke="#4a4a66" stroke-width="0.5" stroke-dasharray="3 4"/>
  <!-- Lumbar adjustment knob -->
  <circle cx="178" cy="130" r="5" fill="#555573"/>
  <circle cx="178" cy="130" r="3" fill="#6e6e8a"/>
  <!-- Seat -->
  <path d="M50 155 Q120 147 190 155 L195 180 Q120 188 45 180 Z" fill="#1a1a2e"/>
  <path d="M56 157 Q120 149 184 157 L188 178 Q120 186 52 178 Z" fill="#2d2d44"/>
  <!-- Seat cushion -->
  <rect x="62" y="159" width="116" height="16" rx="4" fill="#3d3d5c"/>
  <!-- 4D Armrests -->
  <rect x="36" y="138" width="24" height="7" rx="3" fill="#3d3d5c"/>
  <rect x="40" y="118" width="8" height="26" rx="3" fill="#555573"/>
  <rect x="180" y="138" width="24" height="7" rx="3" fill="#3d3d5c"/>
  <rect x="192" y="118" width="8" height="26" rx="3" fill="#555573"/>
  <!-- Armrest pads -->
  <rect x="38" y="136" width="20" height="4" rx="2" fill="#c4704b" opacity="0.5"/>
  <rect x="182" y="136" width="20" height="4" rx="2" fill="#c4704b" opacity="0.5"/>
  <!-- Gas cylinder -->
  <rect x="113" y="180" width="14" height="38" rx="5" fill="#3d3d5c"/>
  <rect x="110" y="184" width="20" height="8" rx="4" fill="#555573"/>
  <!-- Tilt mechanism -->
  <rect x="100" y="178" width="40" height="8" rx="3" fill="#555573"/>
  <!-- Star base -->
  <path d="M120 218 L55 264" stroke="#3d3d5c" stroke-width="5" stroke-linecap="round"/>
  <path d="M120 218 L185 264" stroke="#3d3d5c" stroke-width="5" stroke-linecap="round"/>
  <path d="M120 218 L120 272" stroke="#3d3d5c" stroke-width="5" stroke-linecap="round"/>
  <path d="M120 218 L35 248" stroke="#3d3d5c" stroke-width="5" stroke-linecap="round"/>
  <path d="M120 218 L205 248" stroke="#3d3d5c" stroke-width="5" stroke-linecap="round"/>
  <!-- Casters -->
  <circle cx="55" cy="266" r="7" fill="#555573"/>
  <circle cx="185" cy="266" r="7" fill="#555573"/>
  <circle cx="120" cy="274" r="7" fill="#555573"/>
  <circle cx="35" cy="250" r="7" fill="#555573"/>
  <circle cx="205" cy="250" r="7" fill="#555573"/>
  <!-- Caster inner -->
  <circle cx="55" cy="266" r="4" fill="#6e6e8a"/>
  <circle cx="185" cy="266" r="4" fill="#6e6e8a"/>
  <circle cx="120" cy="274" r="4" fill="#6e6e8a"/>
  <circle cx="35" cy="250" r="4" fill="#6e6e8a"/>
  <circle cx="205" cy="250" r="4" fill="#6e6e8a"/>
</svg>
