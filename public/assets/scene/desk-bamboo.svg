<svg width="440" height="200" viewBox="0 0 440 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bamboo Standing Desk - Natural bamboo top with adjustable height legs -->
  <!-- Desktop surface -->
  <rect x="40" y="60" width="360" height="18" rx="4" fill="#d4a574"/>
  <rect x="40" y="60" width="360" height="8" rx="4" fill="#deb887" opacity="0.7"/>
  <!-- Bamboo grain lines -->
  <line x1="80" y1="63" x2="80" y2="76" stroke="#c49a6c" stroke-width="0.5" opacity="0.4"/>
  <line x1="160" y1="63" x2="160" y2="76" stroke="#c49a6c" stroke-width="0.5" opacity="0.4"/>
  <line x1="240" y1="63" x2="240" y2="76" stroke="#c49a6c" stroke-width="0.5" opacity="0.4"/>
  <line x1="320" y1="63" x2="320" y2="76" stroke="#c49a6c" stroke-width="0.5" opacity="0.4"/>
  <!-- Height adjustment mechanism -->
  <rect x="72" y="78" width="10" height="120" rx="3" fill="#555573"/>
  <rect x="74" y="78" width="6" height="120" rx="2" fill="#6e6e8a"/>
  <rect x="358" y="78" width="10" height="120" rx="3" fill="#555573"/>
  <rect x="360" y="78" width="6" height="120" rx="2" fill="#6e6e8a"/>
  <!-- Inner legs (telescoping) -->
  <rect x="74" y="130" width="6" height="68" rx="2" fill="#8888a0"/>
  <rect x="360" y="130" width="6" height="68" rx="2" fill="#8888a0"/>
  <!-- Feet -->
  <rect x="66" y="196" width="24" height="4" rx="2" fill="#555573"/>
  <rect x="352" y="196" width="24" height="4" rx="2" fill="#555573"/>
  <!-- Cable management tray -->
  <rect x="140" y="78" width="160" height="6" rx="3" fill="#8888a0" opacity="0.3"/>
</svg>
