<svg width="440" height="200" viewBox="0 0 440 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White Minimal Desk - Clean white surface with slim metal legs -->
  <!-- Desktop surface -->
  <rect x="40" y="75" width="360" height="14" rx="3" fill="#f0f0f0"/>
  <rect x="40" y="75" width="360" height="6" rx="3" fill="#fafafa"/>
  <!-- Subtle edge shadow -->
  <rect x="40" y="86" width="360" height="3" rx="1" fill="#e0e0e0" opacity="0.5"/>
  <!-- Slim metal legs - hairpin style -->
  <!-- Left front -->
  <path d="M70 89 L58 198" stroke="#2d2d44" stroke-width="3" stroke-linecap="round"/>
  <path d="M70 89 L82 198" stroke="#2d2d44" stroke-width="3" stroke-linecap="round"/>
  <!-- Left back -->
  <path d="M100 89 L88 198" stroke="#2d2d44" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Right front -->
  <path d="M370 89 L358 198" stroke="#2d2d44" stroke-width="3" stroke-linecap="round"/>
  <path d="M370 89 L382 198" stroke="#2d2d44" stroke-width="3" stroke-linecap="round"/>
  <!-- Right back -->
  <path d="M340 89 L352 198" stroke="#2d2d44" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
</svg>
