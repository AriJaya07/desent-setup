<svg width="100" height="180" viewBox="0 0 100 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Adjustable LED Desk Lamp -->
  <!-- Base -->
  <ellipse cx="50" cy="168" rx="30" ry="8" fill="#2d2d44"/>
  <ellipse cx="50" cy="166" rx="28" ry="6" fill="#3d3d5c"/>
  <!-- Stem lower -->
  <rect x="47" y="90" width="6" height="78" rx="3" fill="#555573"/>
  <!-- Joint -->
  <circle cx="50" cy="90" r="6" fill="#6e6e8a"/>
  <circle cx="50" cy="90" r="3" fill="#555573"/>
  <!-- Upper arm -->
  <path d="M50 90 L72 40" stroke="#555573" stroke-width="5" stroke-linecap="round"/>
  <!-- Head joint -->
  <circle cx="72" cy="40" r="5" fill="#6e6e8a"/>
  <!-- Lamp head -->
  <ellipse cx="72" cy="28" rx="22" ry="12" fill="#3d3d5c"/>
  <ellipse cx="72" cy="30" rx="18" ry="8" fill="#555573"/>
  <!-- Light glow -->
  <ellipse cx="72" cy="34" rx="14" ry="5" fill="#ffd700" opacity="0.3"/>
  <ellipse cx="72" cy="36" rx="8" ry="3" fill="#ffd700" opacity="0.15"/>
  <!-- LED strip -->
  <rect x="58" y="30" width="28" height="3" rx="1.5" fill="#ffd700" opacity="0.5"/>
</svg>
