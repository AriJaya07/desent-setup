<svg width="200" height="160" viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 27" Monitor - IPS display with USB-C -->
  <!-- Monitor bezel -->
  <rect x="10" y="8" width="180" height="110" rx="6" fill="#1a1a2e"/>
  <!-- Screen -->
  <rect x="16" y="14" width="168" height="94" rx="2" fill="#2d3748"/>
  <!-- Screen reflection -->
  <rect x="16" y="14" width="168" height="47" rx="2" fill="#374357" opacity="0.3"/>
  <!-- Screen content hint (subtle gradient) -->
  <rect x="26" y="24" width="80" height="6" rx="2" fill="#4a5568" opacity="0.5"/>
  <rect x="26" y="36" width="120" height="4" rx="2" fill="#4a5568" opacity="0.3"/>
  <rect x="26" y="46" width="100" height="4" rx="2" fill="#4a5568" opacity="0.3"/>
  <!-- Webcam dot -->
  <circle cx="100" cy="11" r="2" fill="#555573"/>
  <!-- Chin -->
  <rect x="60" y="108" width="80" height="10" rx="1" fill="#1a1a2e"/>
  <!-- Stand neck -->
  <rect x="90" y="118" width="20" height="20" rx="2" fill="#2d2d44"/>
  <!-- Stand base -->
  <ellipse cx="100" cy="145" rx="50" ry="8" fill="#2d2d44"/>
  <ellipse cx="100" cy="143" rx="46" ry="6" fill="#3d3d5c"/>
</svg>
