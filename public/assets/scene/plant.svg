<svg width="120" height="180" viewBox="0 0 120 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Monstera Plant in Ceramic Pot -->
  <!-- Pot -->
  <path d="M35 130 L28 170 Q60 178 92 170 L85 130 Z" fill="#c4704b"/>
  <path d="M37 130 L31 168 Q60 175 89 168 L83 130 Z" fill="#d4835e"/>
  <!-- Pot rim -->
  <ellipse cx="60" cy="130" rx="28" ry="6" fill="#c4704b"/>
  <ellipse cx="60" cy="129" rx="26" ry="5" fill="#d4835e"/>
  <!-- Soil -->
  <ellipse cx="60" cy="131" rx="22" ry="3" fill="#5c3d2e"/>
  <!-- Stems -->
  <path d="M55 130 Q52 100 48 80" stroke="#2d7a3a" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M62 128 Q65 90 70 60" stroke="#2d7a3a" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M58 126 Q45 95 35 70" stroke="#2d7a3a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M65 128 Q80 100 88 75" stroke="#2d7a3a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Monstera leaves -->
  <!-- Large leaf right -->
  <path d="M70 60 Q95 40 100 30 Q102 45 90 65 Q80 75 70 60" fill="#3da34d"/>
  <path d="M70 60 Q85 50 90 48" stroke="#2d7a3a" stroke-width="1" fill="none"/>
  <!-- Leaf hole -->
  <circle cx="85" cy="48" r="3" fill="#f2f0ec"/>
  <!-- Large leaf left -->
  <path d="M48 80 Q20 60 15 45 Q10 65 25 85 Q35 92 48 80" fill="#3da34d"/>
  <path d="M48 80 Q30 68 22 58" stroke="#2d7a3a" stroke-width="1" fill="none"/>
  <circle cx="30" cy="65" r="2.5" fill="#f2f0ec"/>
  <!-- Medium leaf top -->
  <path d="M35 70 Q15 50 10 35 Q5 55 20 75 Q28 80 35 70" fill="#45b557"/>
  <path d="M35 70 Q22 57 16 45" stroke="#2d8a3a" stroke-width="0.8" fill="none"/>
  <!-- Small leaf right -->
  <path d="M88 75 Q105 60 108 50 Q106 70 95 82 Q90 84 88 75" fill="#45b557"/>
  <path d="M88 75 Q100 64 105 56" stroke="#2d8a3a" stroke-width="0.8" fill="none"/>
  <!-- New unfurling leaf -->
  <path d="M62 128 Q58 115 56 108 Q54 112 58 125" stroke="#45b557" stroke-width="2" fill="#4ec462" opacity="0.7"/>
</svg>
